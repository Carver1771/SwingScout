<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Booking Request Sent — Swingable Golf</title>
<link rel="icon" type="image/svg+xml" href="/logo-icon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#1b5e3b;--brand-light:#2a7d50;--brand-lighter:#e8f5ec;--brand-dark:#14442b;
  --gold:#c9a84c;--gold-light:#f7f0db;
  --bg:#fafaf8;--card:#ffffff;--surface:#f4f3f0;
  --text:#1a1a1a;--text-secondary:#6b6b6b;--text-muted:#9e9e9e;
  --border:#e8e6e1;--border-light:#f0eeea;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

.header{background:var(--brand-dark);padding:14px 24px;display:flex;align-items:center;gap:10px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff}
.logo-icon-img{height:34px;width:auto;display:block;flex-shrink:0}
.logo-text{font-family:'Libre Baskerville',serif;font-size:18px;font-weight:700;color:#fff}

.wrap{flex:1;max-width:560px;margin:60px auto;padding:0 20px;width:100%}
.card{background:var(--card);border-radius:16px;padding:48px 40px;box-shadow:0 4px 24px rgba(0,0,0,.06);border:1px solid var(--border-light);text-align:center}

.icon-circle{width:72px;height:72px;border-radius:50%;background:var(--brand-lighter);display:flex;align-items:center;justify-content:center;margin:0 auto 24px}

h1{font-family:'Libre Baskerville',serif;font-size:26px;font-weight:700;margin-bottom:12px;color:var(--text)}
.subtitle{font-size:15px;color:var(--text-secondary);line-height:1.6;margin-bottom:28px}

.detail-box{background:var(--surface);border-radius:12px;padding:18px 20px;text-align:left;margin-bottom:28px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:14px}
.detail-row:last-child{border-bottom:none}
.detail-label{color:var(--text-secondary);font-weight:500}
.detail-value{color:var(--text);font-weight:600}

.next-steps{background:var(--gold-light);border-radius:12px;padding:18px 20px;text-align:left;margin-bottom:28px}
.next-steps h3{font-size:14px;font-weight:700;color:var(--brand-dark);margin-bottom:8px}
.next-steps ol{padding-left:20px;font-size:13px;color:var(--text-secondary);line-height:1.7}

.btn{display:inline-block;padding:14px 32px;background:var(--brand);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;text-decoration:none;cursor:pointer;font-family:inherit;transition:background .15s}
.btn:hover{background:var(--brand-light)}

.note{font-size:12px;color:var(--text-muted);margin-top:20px;line-height:1.6}

.loading{text-align:center;padding:40px;color:var(--text-muted);font-size:14px}
</style>
</head>
<body>

<div class="header">
  <a href="/" class="logo">
    <img src="/logo-icon.svg" class="logo-icon-img" alt="Swingable Golf">
    <span class="logo-text">Swingable Golf</span>
  </a>
</div>

<div class="wrap">
  <div class="card" id="content">
    <div class="loading">Loading your booking...</div>
  </div>
</div>

<script>
const SB_URL = 'https://quqknhjdjvdzqyjpglub.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1cWtuaGpkanZkenF5anBnbHViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTI2OTMsImV4cCI6MjA5Mjg4ODY5M30.cP-LdZSLJFukvx51wwlQUzmfO_-WXyRAS58CToX0XFA';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

const params = new URLSearchParams(window.location.search);
const bookingId = params.get('booking_id');
const sessionId = params.get('session_id');

const MNAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

async function loadBooking() {
  const content = document.getElementById('content');

  if (!bookingId) {
    content.innerHTML = `
      <div class="icon-circle">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6L9 17l-5-5"/>
        </svg>
      </div>
      <h1>Booking Request Sent!</h1>
      <p class="subtitle">Your card has been authorized. You won't be charged until your coach confirms the lesson.</p>
      <a href="/" class="btn">Back to Swingable Golf</a>
    `;
    return;
  }

  try {
    const { data: booking, error } = await sb
      .from('bookings')
      .select('*, coaches(first_name, last_name), locations(name, city)')
      .eq('id', bookingId)
      .single();

    if (error || !booking) throw new Error('Booking not found');

    const coachName = booking.coaches ? `${booking.coaches.first_name} ${booking.coaches.last_name}` : 'your coach';
    const locName = booking.locations ? booking.locations.name : 'TBD';
    const dt = new Date(booking.booking_date + 'T12:00:00');
    const dateStr = `${MNAMES[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()}`;
    const totalAmount = booking.amount_paid ? `$${(booking.amount_paid / 100).toFixed(2)}` : `$${booking.price}`;
    const serviceFee = booking.amount_paid ? `$${((booking.amount_paid / 100) - booking.price).toFixed(2)}` : '$0';

    content.innerHTML = `
      <div class="icon-circle">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6L9 17l-5-5"/>
        </svg>
      </div>
      <h1>Booking Request Sent!</h1>
      <p class="subtitle">${coachName} has been notified and will confirm your lesson within 24 hours.</p>

      <div class="detail-box">
        <div class="detail-row">
          <span class="detail-label">Coach</span>
          <span class="detail-value">${coachName}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Date</span>
          <span class="detail-value">${dateStr}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Time</span>
          <span class="detail-value">${booking.booking_time}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Location</span>
          <span class="detail-value">${locName}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Lesson</span>
          <span class="detail-value">$${booking.price}.00</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Service fee</span>
          <span class="detail-value">${serviceFee}</span>
        </div>
        <div class="detail-row" style="border-top:2px solid var(--border);padding-top:12px;margin-top:4px">
          <span class="detail-label" style="font-weight:700;color:var(--text)">Total authorized</span>
          <span class="detail-value" style="font-size:16px;color:var(--brand)">${totalAmount}</span>
        </div>
      </div>

      <div class="next-steps">
        <h3>What happens next?</h3>
        <ol>
          <li>${coachName.split(' ')[0]} reviews your request</li>
          <li>Once they confirm, your card is charged</li>
          <li>If they decline, the authorization is released (no charge)</li>
        </ol>
      </div>

      <a href="/" class="btn">Back to Swingable Golf</a>

      <p class="note">A confirmation email has been sent to ${booking.student_email}.<br>Questions? Reply to that email or contact <a href="mailto:team@swingablegolf.com" style="color:var(--brand)">team@swingablegolf.com</a>.</p>
    `;
  } catch (err) {
    console.error('Load booking error:', err);
    content.innerHTML = `
      <div class="icon-circle">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6L9 17l-5-5"/>
        </svg>
      </div>
      <h1>Booking Request Sent!</h1>
      <p class="subtitle">Your booking has been received. Check your email for confirmation details.</p>
      <a href="/" class="btn">Back to Swingable Golf</a>
    `;
  }
}

loadBooking();
</script>

</body>
</html>
